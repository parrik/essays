name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Astro check (type + frontmatter schema)
        run: npx astro check

      - name: Build
        run: npm run build

      - name: Upload dist for downstream jobs
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  links:
    name: Link check (internal + external)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Lychee internal link check (fail on 4xx for same-site)
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --accept 200,204,206,301,302,303,304,307,308,429
            --timeout 20
            --max-concurrency 8
            --offline
            --root-dir ${{ github.workspace }}/dist
            --base ${{ github.workspace }}/dist
            --fallback-extensions html
            --exclude-path dist/_astro
            --exclude '%23'
            'dist/**/*.html'
          fail: true  # internal links are authoritative; must resolve
          # --exclude '%23' drops fragment-only hrefs (#footnote anchors).
          # With --root-dir, lychee resolves bare '#foo' as file:///root/%23foo
          # and reports "file not found". Same-page anchors are validated by
          # html-validate / browser, not link-check.
          # --base is deprecated in lychee >=0.23 (warning emitted) but
          # --base-url doesn't accept filesystem paths the same way; keep
          # --base until lychee fixes the upgrade path.

      - name: Lychee external link check (informational)
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --accept 200,204,206,301,302,303,304,307,308,429
            --timeout 20
            --max-concurrency 8
            --include-verbatim
            --scheme https
            --exclude-path dist/_astro
            --exclude 'parrik.com'
            'dist/**/*.html'
          fail: false  # external links flake, don't block

  html-validate:
    name: HTML sanity check
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Install html-validate
        run: npm install --no-save html-validate

      - name: Validate essay pages
        run: |
          npx html-validate \
            --formatter stylish \
            'dist/**/*.html' \
            --preset recommended \
            || exit 0  # informational; tighten later
        continue-on-error: true

  styles-loaded:
    # Catches the specific failure class where a page renders without CSS
    # because the stylesheet link or build chunking broke. Validates that
    # every built HTML page has at least one <link rel="stylesheet"> to
    # /_astro/*.css AND that that file exists in dist.
    name: Stylesheet presence check
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Verify every HTML references an existing CSS bundle
        run: |
          set -e
          fail=0
          # Skip standalone HTML copied verbatim from public/ — those are
          # self-contained interactive docs (inline CSS, own styling), not
          # Astro-rendered pages, so they don't reference /_astro/*.css.
          skip_re='^dist/(alex-case-study|example-graph-(full|spine|extended|extended-.*))\.html$'
          for f in $(find dist -name "*.html"); do
            if [[ "$f" =~ $skip_re ]]; then
              continue
            fi
            css=$(grep -oE 'href="/_astro/[^"]+\.css"' "$f" | head -1 | sed 's/href="//;s/"$//')
            if [ -z "$css" ]; then
              echo "::error file=$f::No _astro CSS link found in $f"
              fail=1
              continue
            fi
            css_path="dist${css}"
            if [ ! -f "$css_path" ]; then
              echo "::error file=$f::Referenced CSS missing: $css_path"
              fail=1
            fi
          done
          exit $fail
