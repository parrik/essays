<script>
(function () {
  const DATA = {"R01-origin": {"type": "reference", "type_blurb": "biographical fact", "name": "Grew up in a small town in the Pacific Northwest", "body": "Born and raised in a town of ~8,000 people. Rural, close-knit community.\nLeft at 18 for university in a large city.", "why_alex_cares": "Small-town upbringing shaped her tolerance for quiet and her suspicion of scenes where being visible means being scrutinized.", "unlocks": "Prevents her from reading solo evenings as a symptom; they're part of her native register."}, "R02-career": {"type": "reference", "type_blurb": "biographical fact", "name": "20 years in publishing — editor then senior editor", "body": "Career arc: trade publishing 2005-2015, then academic publishing\n2015-2024. Senior editor at the last role, managing a small team.", "why_alex_cares": "Twenty years of identity is tied up in being an editor who shapes other people's work.", "unlocks": "Makes sense of why the move — which threatened that identity — hit harder than the job change alone would predict."}, "R03-family": {"type": "reference", "type_blurb": "biographical fact", "name": "Single parent; teenage child (age 14)", "body": "Divorced 2019. Primary caregiver for a 14-year-old. Ex-partner lives\nin the previous city; shared custody is possible but practically rare.", "why_alex_cares": "Every decision about time, attention, and risk routes through being the only adult in the house.", "unlocks": "Tells her to read her overwhelm as a structural fact about bandwidth, not a personal failing."}, "R04-move": {"type": "reference", "type_blurb": "biographical fact", "name": "Moved to a new city in August 2024 for a new job", "body": "Relocated ~800 miles for a director-level role at a smaller publishing\nhouse. The move involved selling the old house, renting in the new city,\nenrolling the child in a new school.", "why_alex_cares": "August 2024 is the point where most other nodes start reading differently.", "unlocks": "Anchors the timeline. If a later claim doesn't trace through the move, it probably predates it."}, "O01-first-three-months": {"type": "observation", "type_blurb": "dated event", "name": "First three months in new city — isolation and overwhelm", "body": "Sep-Nov 2024: Alex describes the first three months in the new city\nas the hardest stretch. Working long hours at the new job, child\nstruggling at the new school, no friends yet. Minimal sleep. Stopped\nthe running routine that had been daily for years.", "why_alex_cares": "Those three months are the worst-case data point — what she looks like when several supports collapse at once.", "unlocks": "Future early-warning detection. If the same cluster of signs shows up again, she doesn't wait to call it."}, "O02-running-group": {"type": "observation", "type_blurb": "dated event", "name": "Joined a local running group December 2024", "body": "Dec 2024: Alex joined a small Sunday running group through a\ncommunity app. First weeks felt awkward. By week four had a regular\nconversation with two members. The routine restarted naturally around\nthe social anchor.", "why_alex_cares": "Joining the group was the first time she deliberately chose a structure instead of waiting for one to form.", "unlocks": "Evidence that deliberate social scaffolding works on her — worth repeating when the next drift starts."}, "O03-therapist-referral": {"type": "observation", "type_blurb": "dated event", "name": "Started seeing a therapist Feb 2025", "body": "Feb 2025: Alex began seeing a therapist weekly. Referred by a colleague\nat the new job. First month described as \"mostly just talking\"; by\nmonth three, beginning to notice repeating patterns in own reactions.\nHANDLING: Alex is private about the content of therapy. Do not ask\nabout session specifics unless Alex raises them.", "why_alex_cares": "Starting therapy Feb 2025 is an observation, not an interpretation; the novel about what therapy is doing for her (N02) is downstream.", "unlocks": "Keeps the event and the theory about the event separate — so if the theory is wrong, the event is still on record."}, "O04-daughter-grades-recovered": {"type": "observation", "type_blurb": "dated event", "name": "Child's grades recovered in spring semester", "body": "Spring 2025: child's grades, which had dropped in the fall after the\nmove, recovered to pre-move levels by April. Alex attributes this to\n(a) a specific teacher the child connected with, and (b) more stability\nat home as Alex's own routine re-established.", "why_alex_cares": "Her daughter's recovery tracks her own stabilization almost too closely to be coincidence.", "unlocks": "Grounds the emergent claim (E01) that the child's trajectory rides on the mother's — testable, not just felt."}, "O05-workplace-conflict": {"type": "observation", "type_blurb": "dated event", "name": "Conflict with a senior colleague, March 2025", "body": "March 2025: disagreement with a senior colleague over an acquisitions\ndecision. Alex held the position, eventually persuaded the rest of the\nteam, but the colleague has remained cool since. Alex reported feeling\n\"stretched but not wrong.\"", "why_alex_cares": "The March conflict is one data point for the overlap about holding costly positions (P02).", "unlocks": "One instance is not a pattern. If a second independent conflict shows the same shape, the overlap strengthens; until then, P02 rests on P02 alone."}, "P01-routine-as-regulation": {"type": "overlap", "type_blurb": "pattern across observations", "name": "Physical routine is load-bearing for Alex's stability", "body": "When Alex's physical routine (running, sleep) breaks down, other\nthings deteriorate proportionally — work hours extend, child's needs\nare harder to respond to, mood lowers. When it returns, the other\nthings stabilize. This is not a preference — it appears to be\nstructural.", "why_alex_cares": "Physical routine isn't a preference — when it breaks, several downstream things deteriorate together.", "unlocks": "Gives her a leading indicator. Protect the routine when everything else is on fire; collapse there predicts collapse elsewhere."}, "P02-holds-positions-in-work": {"type": "overlap", "type_blurb": "pattern across observations", "name": "Alex holds positions in work even when costly", "body": "In work contexts, Alex is willing to hold a minority position and\npersuade toward it, rather than yielding for social ease. This has\nboth positive outcomes (successful acquisitions, team respect) and\ncosts (cooled relationships with those overruled).", "why_alex_cares": "She tends to hold professional positions even when the personal cost is high.", "unlocks": "Named, she can ask 'is this me holding the position because it's right or because I always do?' The reflex becomes visible."}, "N01-isolation-is-early-warning": {"type": "novel", "type_blurb": "tentative interpretation", "name": "Isolation is an early warning signal, not a neutral state", "body": "PROPOSED: for Alex, extended periods without meaningful social contact\ndon't simply feel neutral or quiet — they appear to be upstream of\nphysical-routine breakdown and downstream effects. The first-three-\nmonths episode is the clearest case. <em>Caveats:</em> Could be wrong because:\n(1) O01 conflates isolation with several other changes (new job\n    pressure, child's struggles, house move) — isolation may not be\n    the driver.\n(2) Only one detailed episode; needs a second independent instance.\n(3) Alex might be describing a general stretch of difficulty, with\n    isolation as a coincident feature rather than cause.", "why_alex_cares": "Isolation may be upstream of routine collapse — but only one episode supports this so far.", "unlocks": "Flagged as a hypothesis, not a verdict. If she treats it as settled, she could over-optimize for company and miss the real upstream variable."}, "N02-therapy-as-pattern-finding": {"type": "novel", "type_blurb": "tentative interpretation", "name": "Therapy is functioning as pattern-finding, not emotional processing", "body": "PROPOSED: Alex's description of therapy (\"noticing repeating patterns\nin own reactions\") suggests it is being used primarily as a cognitive\ntool for self-observation, rather than as emotional processing of\nspecific events. This may be appropriate for Alex's current stage or\nmay be a way of staying at one remove. <em>Caveats:</em> This is speculative. Alex has been private about session content\n(see O03 HANDLING) so the interpretation relies on brief described\nframing only. Should not be propagated until Alex confirms or\ndisconfirms directly.", "why_alex_cares": "Therapy may be functioning more as pattern-recognition than emotional processing for her — a specific, falsifiable reading.", "unlocks": "Keeps the option open that therapy is doing something else (support, ritual, accountability). Protects her from prematurely locking in one theory of the practice."}, "E01-child-stability-depends-on-alex-stability": {"type": "emergent", "type_blurb": "claim at an intersection", "name": "Child's stability in the new city depends on Alex's routine stability", "body": "Emerges from intersection of routine-as-regulation (P01) and the\nobservation that the child's grade recovery (O04) coincided with Alex\nre-establishing physical routine. Neither alone produces the claim;\ntogether they do. Operational consequence: prioritizing Alex's\nroutine is not self-indulgence — it's direct parenting infrastructure.", "why_alex_cares": "Her child's stability in the new city precipitates from the intersection of Alex's routine (P01) and the child's grades recovering (O04) — neither observation alone would tell her this.", "unlocks": "Makes the cost of her own routine-collapse legible. It's not just her that pays — it's coupled downstream."}, "EQ01-scaffolding-through-ritual": {"type": "equivalency", "type_blurb": "bridge to external framework", "name": "Routine as structural scaffolding (external-theory bridge)", "body": "Alex is familiar with the concept of \"ritual structure\" from\ncontemplative literature — the idea that repeated physical practice\nmaintains the internal conditions for clarity. P01 (routine-as-\nregulation) is a personal instance of this broader framework. The\nequivalency is informational, not prescriptive — it names a thing\nAlex already has vocabulary for.", "why_alex_cares": "The pattern she's discovering has been named before in ritual theory and monastic practice — routine as structural scaffolding for clarity, not willpower.", "unlocks": "Lets her borrow language and design from a larger tradition without flattening her specific observation into it."}, "PR01-protect-sunday-run": {"type": "practice", "type_blurb": "operating method", "name": "Sunday 8–10am is protected for the running group", "body": "Operating rule adopted after the pattern clarified: no work events,\nno family scheduling Sunday 8–10am. The routine is upstream of\neverything else, and the child's stability indexes off it, so\nprotecting it is not self-indulgence but operational infrastructure.", "why_alex_cares": "Protecting the Sunday 8–10am run is the smallest durable commitment that holds P01 in place.", "unlocks": "Concrete. Not 'prioritize routine' — an actual block on a calendar that can be defended by name."}, "OQ01-long-term-plan": {"type": "open", "type_blurb": "unresolved question", "name": "Is the move a 2-3 year plan or a permanent relocation?", "body": "Alex has not said. The question matters for several downstream\ndecisions (child's schooling, buying vs. renting, depth of community\ninvestment). Do not let this get quietly absorbed into an assumed\nanswer — Alex should decide explicitly. Unresolved — kept first-class so it does not collapse into a novel.", "why_alex_cares": "Whether the move is a 2–3 year plan or permanent changes the meaning of several downstream nodes.", "unlocks": "Held open deliberately. If it prematurely crystallized into a confident answer, a dozen interpretations would inherit an unexamined premise."}, "OQ02-relationship-with-ex": {"type": "open", "type_blurb": "unresolved question", "name": "Is the cool relationship with ex-partner stable or in drift?", "body": "The practical constraints of distance have produced less contact\nthan formal custody anticipates. Unclear whether this is a stable\nequilibrium or a slow drift toward a more distant arrangement that\nAlex has feelings about but has not named. Unresolved — kept first-class so it does not collapse into a novel.", "why_alex_cares": "The relationship with her ex is currently cool; whether it's stable-cool or drifting matters for future decisions.", "unlocks": "Kept as an open question so it doesn't quietly become a novel ('it's stable') before the evidence is there."}};
  const tip = document.getElementById('tooltip');

  function escape(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, (c) => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    })[c]);
  }

  document.querySelectorAll('g.node').forEach((g) => {
    const title = g.querySelector('title');
    if (!title) return;
    const id = title.textContent.trim();
    const d = DATA[id];
    if (!d) return;

    g.setAttribute('data-node-id', id);

    g.addEventListener('mouseenter', () => {
      let html =
        '<div class="type">' + escape(d.type) +
        '<span class="dot">·</span>' + escape(d.type_blurb) + '</div>' +
        '<div class="name">' + escape(d.name) + '</div>';
      if (d.why_alex_cares) {
        html += '<div class="why"><span class="label">Why Alex cares:</span> ' +
                escape(d.why_alex_cares) + '</div>';
      }
      if (d.unlocks) {
        html += '<div class="unlocks"><span class="label">Knowing this unlocks:</span> ' +
                escape(d.unlocks) + '</div>';
      }
      tip.innerHTML = html;
      tip.classList.add('visible');
    });
    g.addEventListener('mouseleave', () => tip.classList.remove('visible'));
    g.addEventListener('mousemove', (e) => {
      const pad = 14;
      const w = tip.offsetWidth || 320;
      const h = tip.offsetHeight || 80;
      let x = e.clientX + pad;
      let y = e.clientY + pad;
      if (x + w > window.innerWidth - 8) x = e.clientX - w - pad;
      if (y + h > window.innerHeight - 8) y = e.clientY - h - pad;
      tip.style.left = x + 'px';
      tip.style.top = y + 'px';
    });
  });
})();
</script>
